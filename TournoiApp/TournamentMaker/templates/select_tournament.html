{% extends 'base_generic.html' %}

{% block content %}
  <h2>Sélectionner un tournoi</h2>
  <form method="POST">
    {% csrf_token %}
    <select name="tournament_id">
      {% for tournoi in tournois %}
        <option value="{{ tournoi.id }}">{{ tournoi.name }}</option>
      {% endfor %}
    </select>
    <button type="submit">Entrer</button>
  </form>
{% endblock %}
